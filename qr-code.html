<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - 12A SHOP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 28px;
            color: #2d3436;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #636e72;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .qr-container {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
        }

        #qrcode {
            display: inline-block;
        }

        .url-display {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
            color: #495057;
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-download {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }

        .btn-copy {
            background: #6c5ce7;
            color: white;
        }

        .btn-copy:hover {
            background: #5f4dd1;
            transform: translateY(-2px);
        }

        .btn-back {
            background: #636e72;
            color: white;
        }

        .btn-back:hover {
            background: #2d3436;
            transform: translateY(-2px);
        }

        .info {
            margin-top: 30px;
            padding: 20px;
            background: #e3f2fd;
            border-radius: 10px;
            border-left: 4px solid #2196f3;
        }

        .info h3 {
            color: #1976d2;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .info p {
            color: #424242;
            font-size: 14px;
            line-height: 1.6;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 QR Code - 12A SHOP</h1>
        <p class="subtitle">Quét mã để truy cập trang đặt hàng</p>

        <div class="qr-container">
            <div id="qrcode"></div>
        </div>

        <div class="url-display">
            https://leoliebe2008.github.io/APP-CHIP/APP.html
        </div>

        <div class="buttons">
            <button class="btn-download" onclick="downloadQR()">📥 Tải QR Code</button>
            <button class="btn-copy" onclick="copyURL()">📋 Copy Link</button>
            <button class="btn-back" onclick="window.location.href='APP.html'">← Về trang chủ</button>
        </div>

        <div class="info">
            <h3>💡 Cách sử dụng:</h3>
            <p>
                • Quét mã QR bằng camera điện thoại để truy cập nhanh<br>
                • Tải ảnh QR code để in ra hoặc chia sẻ<br>
                • Copy link để gửi cho khách hàng
            </p>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const url = 'https://leoliebe2008.github.io/APP-CHIP/APP.html';

        // Tạo QR Code
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            text: url,
            width: 256,
            height: 256,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Download QR Code
        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = '12A-SHOP-QR-Code.png';
                link.href = canvas.toDataURL();
                link.click();
                showNotification('✅ Đã tải QR Code!');
            } else {
                // Fallback: use img
                const img = document.querySelector('#qrcode img');
                if (img) {
                    const link = document.createElement('a');
                    link.download = '12A-SHOP-QR-Code.png';
                    link.href = img.src;
                    link.click();
                    showNotification('✅ Đã tải QR Code!');
                }
            }
        }

        // Copy URL
        function copyURL() {
            navigator.clipboard.writeText(url).then(() => {
                showNotification('✅ Đã copy link!');
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = url;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showNotification('✅ Đã copy link!');
            });
        }

        // Show notification
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    notification.style.display = 'none';
                    notification.style.animation = 'slideIn 0.3s ease';
                }, 300);
            }, 2000);
        }
    </script>
</body>
</html>
